storage:
  mode: local  # local | obs
  obs_root: obs://yw-2030-gy/external/personal/f50000365/navsim_dataset
  local_dataset_root: ${oc.env:OPENSCENE_DATA_ROOT,/cache/navsim_dataset/dataset}
  local_exp_root: ${oc.env:NAVSIM_EXP_ROOT,/cache/navsim_dataset/exp}
  obs_image_cache_size: 128
  obs_filter_missing_images: false

train:
  _target_: fastwam.datasets.navsim_v1.NavsimV1FastWAMDataset
  navsim_log_path: ${navsim_storage_path:${data.storage.mode},${data.storage.local_dataset_root},${data.storage.obs_root}/dataset,navsim_logs/trainval}
  sensor_blobs_path: ${navsim_storage_path:${data.storage.mode},${data.storage.local_dataset_root},${data.storage.obs_root}/dataset,sensor_blobs/trainval}
  metric_cache_path: ${navsim_storage_path:${data.storage.mode},${data.storage.local_exp_root},${data.storage.obs_root}/exp,metric_cache_v1.1.0_navtrain}
  storage_mode: ${data.storage.mode}
  split: train
  split_mode: official
  navsim_split_name: navtrain  # all_scenes
  split_config_root: ./third_party/navsim/navsim/planning/script/config
  log_split_file: default_train_val_test_log_split.yaml
  num_future_frames: 8
  frame_interval: 1
  has_route: true
  max_scenes: null
  camera: CAM_F0
  video_size: [352, 640]
  text_embedding_cache_dir: ./data/text_embeds_cache/navsim_v1
  context_len: 128
  prompt: "A front camera video from an autonomous vehicle. Predict the ego vehicle's 4-second future trajectory."
  pretrained_norm_stats: null
  image_cache_size: ${navsim_image_cache_size:${data.storage.mode},${data.storage.obs_image_cache_size}}
  filter_missing_images: ${navsim_filter_missing_images:${data.storage.mode},${data.storage.obs_filter_missing_images}}
  is_training_set: true
  shape_meta:
    action:
      - key: default
        raw_shape: 3
        shape: 3
    state:
      - key: default
        raw_shape: 8
        shape: 8
  processor:
    action_output_dim: 3
    proprio_output_dim: 8
  use_stepwise_action_norm: false
  norm_default_mode: "z-score"
  norm_exception_mode: null

val:
  _target_: fastwam.datasets.navsim_v1.NavsimV1FastWAMDataset
  navsim_log_path: ${data.train.navsim_log_path}
  sensor_blobs_path: ${data.train.sensor_blobs_path}
  metric_cache_path: ${data.train.metric_cache_path}
  storage_mode: ${data.train.storage_mode}
  split: val
  split_mode: ${data.train.split_mode}
  navsim_split_name: ${data.train.navsim_split_name}
  split_config_root: ${data.train.split_config_root}
  log_split_file: ${data.train.log_split_file}
  num_future_frames: ${data.train.num_future_frames}
  frame_interval: ${data.train.frame_interval}
  has_route: ${data.train.has_route}
  max_scenes: null
  camera: ${data.train.camera}
  video_size: ${data.train.video_size}
  text_embedding_cache_dir: ${data.train.text_embedding_cache_dir}
  context_len: ${data.train.context_len}
  prompt: ${data.train.prompt}
  pretrained_norm_stats: null
  is_training_set: false
  image_cache_size: ${data.train.image_cache_size}
  filter_missing_images: ${data.train.filter_missing_images}
  shape_meta: ${data.train.shape_meta}
  processor: ${data.train.processor}
  use_stepwise_action_norm: ${data.train.use_stepwise_action_norm}
  norm_default_mode: ${data.train.norm_default_mode}
  norm_exception_mode: ${data.train.norm_exception_mode}

test:
  _target_: fastwam.datasets.navsim_v1.NavsimV1FastWAMDataset
  navsim_log_path: ${navsim_storage_path:${data.storage.mode},${data.storage.local_dataset_root},${data.storage.obs_root}/dataset,navsim_logs/test}
  sensor_blobs_path: ${navsim_storage_path:${data.storage.mode},${data.storage.local_dataset_root},${data.storage.obs_root}/dataset,sensor_blobs/test}
  metric_cache_path: ${navsim_storage_path:${data.storage.mode},${data.storage.local_exp_root},${data.storage.obs_root}/exp,metric_cache_v1.1.0_navtest}
  storage_mode: ${data.storage.mode}
  split: test
  split_mode: ${data.train.split_mode}
  navsim_split_name: navtest
  split_config_root: ${data.train.split_config_root}
  log_split_file: ${data.train.log_split_file}
  num_future_frames: ${data.train.num_future_frames}
  frame_interval: ${data.train.frame_interval}
  has_route: ${data.train.has_route}
  max_scenes: null
  camera: ${data.train.camera}
  video_size: ${data.train.video_size}
  text_embedding_cache_dir: ${data.train.text_embedding_cache_dir}
  context_len: ${data.train.context_len}
  prompt: ${data.train.prompt}
  pretrained_norm_stats: null
  is_training_set: false
  image_cache_size: ${data.train.image_cache_size}
  filter_missing_images: ${data.train.filter_missing_images}
  shape_meta: ${data.train.shape_meta}
  processor: ${data.train.processor}
  use_stepwise_action_norm: ${data.train.use_stepwise_action_norm}
  norm_default_mode: ${data.train.norm_default_mode}
  norm_exception_mode: ${data.train.norm_exception_mode}
